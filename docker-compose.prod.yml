# Production Docker Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file provides production-specific overrides for security and performance.

version: "3.9"

services:
  app:
    # Production image with specific tag
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-1.0.0}

    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    # Production environment overrides
    environment:
      # Disable debug mode
      - DEBUG=false

      # Production security settings
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS_PER_MINUTE=60

      # Production MongoDB with authentication
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGODB_DATABASE}?authSource=admin

      # CORS restricted to production domains
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Don't expose port externally (use reverse proxy)
    ports: []

  mongodb:
    # Production MongoDB with authentication
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}

    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Don't expose port externally
    ports: []

  chromadb:
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Don't expose port externally
    ports: []

  # Remove mongo-express in production
  mongo-express:
    profiles:
      - tools-disabled-in-prod
