version: "3.9"

# IntegrityKit Docker Compose for local development
# Usage: docker-compose up -d

services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: integritykit-app
    ports:
      - "8000:8000"
    environment:
      # MongoDB connection
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=integritykit

      # ChromaDB connection
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000

      # Slack (set these in .env for local development)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-xoxb-placeholder}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-placeholder}
      - SLACK_WORKSPACE_ID=${SLACK_WORKSPACE_ID:-T123456}

      # OpenAI (set in .env)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-placeholder}

      # Application settings
      - DEBUG=${DEBUG:-false}
      - DEFAULT_RETENTION_DAYS=${DEFAULT_RETENTION_DAYS:-90}
      - TWO_PERSON_RULE_ENABLED=${TWO_PERSON_RULE_ENABLED:-true}
      - ABUSE_DETECTION_ENABLED=${ABUSE_DETECTION_ENABLED:-true}

      # v1.0 Multi-Language Support
      - SUPPORTED_LANGUAGES=${SUPPORTED_LANGUAGES:-en,es,fr}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - LANGUAGE_DETECTION_ENABLED=${LANGUAGE_DETECTION_ENABLED:-true}
      - LANGUAGE_DETECTION_CONFIDENCE_THRESHOLD=${LANGUAGE_DETECTION_CONFIDENCE_THRESHOLD:-0.8}

      # v1.0 Analytics
      - ANALYTICS_RETENTION_DAYS=${ANALYTICS_RETENTION_DAYS:-365}
      - MAX_ANALYTICS_TIME_RANGE_DAYS=${MAX_ANALYTICS_TIME_RANGE_DAYS:-90}

      # v1.0 Webhooks
      - WEBHOOKS_ENABLED=${WEBHOOKS_ENABLED:-true}
      - WEBHOOK_TIMEOUT_SECONDS=${WEBHOOK_TIMEOUT_SECONDS:-10}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}

      # v1.0 Exports
      - CAP_EXPORT_ENABLED=${CAP_EXPORT_ENABLED:-true}
      - EDXL_DE_EXPORT_ENABLED=${EDXL_DE_EXPORT_ENABLED:-true}
      - GEOJSON_EXPORT_ENABLED=${GEOJSON_EXPORT_ENABLED:-true}
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - integritykit-network
    restart: unless-stopped

  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: integritykit-mongodb
    ports:
      - "127.0.0.1:27017:27017"  # Bind to localhost only for security
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      - MONGO_INITDB_DATABASE=integritykit
      # SECURITY: For production, enable authentication
      # - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      # - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - integritykit-network
    restart: unless-stopped

  # ChromaDB vector database for embeddings
  chromadb:
    image: chromadb/chroma:latest
    container_name: integritykit-chromadb
    ports:
      - "127.0.0.1:8001:8000"  # Bind to localhost only for security
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      # SECURITY: For production, enable authentication
      # - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_CREDENTIALS}
      # - CHROMA_SERVER_AUTH_PROVIDER=token
    networks:
      - integritykit-network
    restart: unless-stopped

  # MongoDB Express for database management (optional)
  mongo-express:
    image: mongo-express:1.0
    container_name: integritykit-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-admin}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - integritykit-network
    profiles:
      - tools
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  chromadb_data:
    driver: local

networks:
  integritykit-network:
    driver: bridge
